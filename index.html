<!DOCTYPE html>
<html>
<head>
    <title>VBT Coach</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding-top: 50px; }
        #speed { font-size: 120px; font-weight: bold; color: #00ff00; margin: 20px 0; }
        button { padding: 20px 40px; font-size: 20px; border-radius: 50px; border: none; background: #007bff; color: white; cursor: pointer; }
        .label { font-size: 24px; color: #888; }
    </style>
</head>
<body>
    <div class="label">Ostatnie powtórzenie:</div>
    <div id="speed">0.00</div>
    <div class="label">m/s</div>
    <br><br>
    <button onclick="connectBLE()">POŁĄCZ Z XIAO</button>

    <script>
    async function connectBLE() {
        try {
            // Wersja maksymalnie uproszczona, żeby wymusić listę
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ['00001101-0000-1000-8000-00805f9b34fb'] // Pełny identyfikator usługi
            });

            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('00001101-0000-1000-8000-00805f9b34fb');
            const characteristic = await service.getCharacteristic('00001102-0000-1000-8000-00805f9b34fb');
            
            await characteristic.startNotifications();
            
            const decoder = new TextDecoder('utf-8');
            characteristic.addEventListener('characteristicvaluechanged', (event) => {
                const text = decoder.decode(event.target.value);
                document.getElementById('speed').innerText = text;
            });

            alert("Połączono!");
        } catch (error) {
            // Wyświetli dokładną nazwę błędu, co ułatwi nam naprawę
            console.log(error);
            alert("Błądddd: " + error.name + " - " + error.message);
        }
    }
</script>
</body>
</html>
