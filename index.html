<!DOCTYPE html>
<html>
<head>
    <title>VBT Coach</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding-top: 50px; }
        #speed { font-size: 120px; font-weight: bold; color: #00ff00; margin: 20px 0; }
        button { padding: 20px 40px; font-size: 20px; border-radius: 50px; border: none; background: #007bff; color: white; cursor: pointer; }
        .label { font-size: 24px; color: #888; }
    </style>
</head>
<body>
    <div class="label">Ostatnie powtórzenie:</div>
    <div id="speed">0.00</div>
    <div class="label">m/s</div>
    <br><br>
    <button onclick="connectBLE()">POŁĄCZ Z XIAO</button>

    <script>
    // Używamy pełnych adresów UUID - to eliminuje 90% błędów na iOS
    const SERVICE_UUID = "00001101-0000-1000-8000-00805f9b34fb";
    const CHAR_UUID    = "00001102-0000-1000-8000-00805f9b34fb";

    async function connectBLE() {
        try {
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: [SERVICE_UUID]
            });
            
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            const characteristic = await service.getCharacteristic(CHAR_UUID);
            
            await characteristic.startNotifications();
            characteristic.addEventListener('characteristicvaluechanged', (event) => {
                const value = new TextDecoder().decode(event.target.value);
                document.getElementById('speed').innerText = value;
            });
            
            document.querySelector('button').innerText = "POŁĄCZONO";
            document.querySelector('button').style.background = "#28a745";
        } catch (error) {
            alert("Błąd: " + error);
            console.log(error);
        }
    }
    </script>
</body>
</html>
