<!DOCTYPE html>
<html>
<head>
    <title>VBT Coach</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding-top: 50px; }
        #speed { font-size: 120px; font-weight: bold; color: #00ff00; margin: 20px 0; }
        button { padding: 20px 40px; font-size: 20px; border-radius: 50px; border: none; background: #007bff; color: white; cursor: pointer; }
        .label { font-size: 24px; color: #888; }
    </style>
</head>
<body>
    <div class="label">Ostatnie powtórzenie:</div>
    <div id="speed">0.00</div>
    <div class="label">m/s</div>
    <br><br>
    <button onclick="connectBLE()">POŁĄCZ Z XIAO</button>

    <script>
        async function connectBLE() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'VBT_Coach' }],
                    optionalServices: [0x1101]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(0x1101);
                const char = await service.getCharacteristic(0x1102);
                
                await char.startNotifications();
                char.addEventListener('characteristicvaluechanged', (e) => {
                    const val = new TextDecoder().decode(e.target.value);
                    document.getElementById('speed').innerText = val;
                });
                alert("Połączono!");
            } catch (v) { alert("Błąd: " + v); }
        }
    </script>
</body>
</html>
