<!DOCTYPE html>
<html>
<head>
    <title>VBT Coach</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding-top: 50px; }
        #speed { font-size: 120px; font-weight: bold; color: #00ff00; margin: 20px 0; }
        button { padding: 20px 40px; font-size: 20px; border-radius: 50px; border: none; background: #007bff; color: white; cursor: pointer; }
        .label { font-size: 24px; color: #888; }
    </style>
</head>
<body>
    <div class="label">Ostatnie powtórzenie:</div>
    <div id="speed">0.00</div>
    <div class="label">m/s</div>
    <br><br>
    <button onclick="connectBLE()">POŁĄCZ Z XIAO</button>

    <script>
    async function connectBLE() {
        try {
            // "acceptAllDevices" naprawia Błąd: 2 (NotFoundError)
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: [0x1101]
            });

            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(0x1101);
            const characteristic = await service.getCharacteristic(0x1102);
            
            await characteristic.startNotifications();
            
            const decoder = new TextDecoder('utf-8');

            characteristic.addEventListener('characteristicvaluechanged', (event) => {
                // To odczyta cały tekst (np. "0.85") zamiast pojedynczych znaków
                const value = event.target.value;
                const text = decoder.decode(value);
                document.getElementById('speed').innerText = text;
            });

            alert("Połączono!");
        } catch (v) { alert("Błąd: " + v); }
    }
</script>
</body>
</html>
